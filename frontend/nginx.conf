server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Permitir uploads ate 100 MB (WhatsApp max para documentos).
    # Sem isto o nginx rejeita ficheiros >1 MB com 413 antes de o pedido chegar
    # ao backend. Aplica-se a TODAS as location deste server.
    client_max_body_size 100M;
    client_body_buffer_size 1M;
    client_body_timeout 300s;

    # API -> backend (servico interno "sawa_backend" na porta 3001)
    location /api/ {
        proxy_pass http://sawa_backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Timeouts generosos para uploads grandes
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }

    # Ficheiros enviados (uploads) -> backend
    location /uploads/ {
        proxy_pass http://sawa_backend:3001;
        proxy_set_header Host $host;
    }

    # WebSocket do socket.io -> backend (com upgrade de ligacao)
    location /socket.io/ {
        proxy_pass http://sawa_backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Aplicacao React (SPA): qualquer outra rota cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
